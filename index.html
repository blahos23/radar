<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Guard - Historie</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #2c3e50; color: white; margin: 0; padding: 20px; }
        #status-box { font-size: 2.5rem; font-weight: bold; padding: 20px; border-radius: 15px; border: 4px solid white; margin-bottom: 20px; width: 80%; text-align: center; }
        .state-KLID { background-color: #27ae60; }
        .state-POZOR { background-color: #f1c40f; color: black; }
        .state-NEBEZPECI { background-color: #e74c3c; }
        
        #history-container { width: 90%; max-width: 500px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .history-item { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .hist-NEBEZPECI { color: #ff7675; font-weight: bold; }
        .hist-POZOR { color: #ffe66d; }
        
        button { padding: 15px 30px; border-radius: 50px; border: none; background: #3498db; color: white; cursor: pointer; margin-bottom: 10px; }
        .clear-btn { background: #95a5a6; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body id="bg">

    <div id="status-box">ODPOJENO</div>
    <button id="btn" onclick="connectBLE()">PŘIPOJIT RADAR</button>
    
    <h3>HISTORIE UDÁLOSTÍ</h3>
    <div id="history-container">
        <div id="history-list"></div>
    </div>
    <button class="clear-btn" onclick="clearHistory()">Smazat historii</button>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        let currentStatus = "KLID";
        let lastLoggedStatus = "KLID";

        // Načtení historie při startu
        window.onload = displayHistory;

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'XIAO_Radar_Guard' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                document.getElementById('btn').style.display = "none";
                characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleNotifications);
                startVibrationLoop();
            } catch (error) { alert("Chyba připojení."); }
        }

        function handleNotifications(event) {
            let value = new TextDecoder().decode(event.target.value);
            currentStatus = value;

            document.getElementById('status-box').innerText = value;
            document.getElementById('bg').className = 'state-' + value;

            // Logování pouze pokud se stav změní na varovný
            if (value !== lastLoggedStatus) {
                if (value === "NEBEZPECI" || value === "POZOR") {
                    saveToHistory(value);
                }
                lastLoggedStatus = value;
            }
        }

        function saveToHistory(status) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0');
            
            const event = { time: timeStr, type: status };
            
            // Získání stávající historie z paměti
            let history = JSON.parse(localStorage.getItem('radarHistory')) || [];
            history.unshift(event); // Přidat na začátek
            
            // Omezení historie na 50 záznamů
            if (history.length > 50) history.pop();
            
            localStorage.setItem('radarHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('radarHistory')) || [];
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${item.time}</span> <span class="hist-${item.type}">${item.type}</span>`;
                list.appendChild(div);
            });
        }

        function clearHistory() {
            localStorage.removeItem('radarHistory');
            displayHistory();
        }

        function startVibrationLoop() {
            let tick = 0;
            setInterval(() => {
                if (!navigator.vibrate) return;
                if (currentStatus === "NEBEZPECI") { navigator.vibrate(400); } 
                else if (currentStatus === "POZOR") {
                    tick++;
                    if (tick >= 6) { navigator.vibrate(200); tick = 0; }
                } else { tick = 0; }
            }, 500);
        }
    </script>
</body>
</html>
